<!-- Shell: overlays globales (toast/confirm) + top bar fijo + router-outlet -->
<p-toast position="top-right" />
<p-confirmdialog />

<header class="app-header">
  <div class="app-title">
    <h1>{{ title() }} <small>Vulkan · multi-GPU</small></h1>
  </div>

  <div class="section-right">
    <!-- Métricas GPU/RAM en vivo (cards con barras verticales). -->
    <app-gpu-grid class="app-metrics" />

    <app-status-bar class="app-status" />

    <p-button
      [text]="true"
      severity="secondary"
      icon="pi pi-moon"
      title="Alternar modo oscuro"
      (onClick)="toggleDarkMode()"
    />
  </div>
</header>

<main class="app-body">
  <router-outlet />
</main>
