<!-- Shell: overlays globales (toast/confirm) + top bar fijo + router-outlet -->
<p-toast position="top-right" />
<p-confirmdialog />

<header class="app-header">
  <div class="app-title">
    <h1>{{ title() }} <small>Vulkan · multi-GPU</small></h1>
  </div>

  <app-status-bar class="app-status" />

  <p-button
    [text]="true"
    severity="secondary"
    icon="pi pi-moon"
    title="Alternar modo oscuro"
    (onClick)="toggleDarkMode()"
  />
</header>

<main class="app-body">
  <router-outlet />
</main>
