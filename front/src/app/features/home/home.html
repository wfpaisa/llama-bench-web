<main class="home">
  <!-- Métricas siempre arriba (GPU/RAM en vivo). -->
  <app-gpu-grid />

  <!-- Último resultado: visible cuando existe, debajo de las métricas. -->
  <app-last-result />
  <app-response-card />

  <!-- Tabs: configuración del servidor vs benchmark/historial. -->
  <p-tabs [value]="tab()" (valueChange)="tab.set($any($event))">
    <p-tablist>
      <p-tab [value]="0">Script server</p-tab>
      <p-tab [value]="1">Benchmark</p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel [value]="0">
        <app-script-editor />
      </p-tabpanel>
      <p-tabpanel [value]="1">
        <app-benchmark-panel />
        <app-history-table />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>

  <app-compare-modal />

  <!-- Logs en tiempo real siempre visibles en la parte inferior. -->
  <div class="home-logs">
    <app-logs-viewer />
  </div>
</main>
