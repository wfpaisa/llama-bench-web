<main class="home">
  <!-- Tabs: configuración del servidor vs benchmark/historial. -->

  <p-tabs [value]="tab()" (valueChange)="tab.set($any($event))">
    <p-tablist>
      <p-tab [value]="0">Script server</p-tab>
      <p-tab [value]="1">Benchmark</p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel [value]="0">
        <app-script-editor />
      </p-tabpanel>
      <p-tabpanel [value]="1">
        <div class="sections">
          <app-benchmark-panel />
          <!-- Último resultado: visible cuando existe, debajo de las métricas. -->
          <app-last-result />
          <app-response-card />
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>

  <app-history-table />
  <app-compare-modal />

  <!-- Logs en tiempo real siempre visibles en la parte inferior. -->
  <div class="home-logs">
    <app-logs-viewer />
  </div>
</main>
