<section class="card">
  <div class="row-between">
    <h2>Logs en tiempo real</h2>
    <div class="logs-controls">
      <div class="autoscroll">
        <p-checkbox
          [(ngModel)]="autoscrollModel"
          [binary]="true"
          (ngModelChange)="store.setAutoscroll($event)"
        />
        <label for="autoscroll">auto-scroll</label>
      </div>
      <p-button
        label="Limpiar"
        icon="pi pi-trash"
        [text]="true"
        size="small"
        (onClick)="clear()"
      />
    </div>
  </div>

  <div #logsEl class="logs" [class.empty]="!logs().length">
    @for (e of logs(); track $index) {
      <div [class]="'ln-' + e.stream">
        <span class="ts">+{{ (e.t / 1000).toFixed(1) }}s</span>
        <span class="msg">{{ e.msg }}</span>
      </div>
    } @empty {
      <span class="muted">Sin logs todavía.</span>
    }
  </div>
</section>
